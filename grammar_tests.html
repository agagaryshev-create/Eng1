<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Grammar Tests</title>

<style>
body {
  font-family: Arial;
  max-width: 850px;
  margin: 20px auto;
  background: #f9f9f9;
  padding: 10px;
}

h1 { text-align: center; }

button {
  padding: 10px 14px;
  margin: 5px;
  cursor: pointer;
  border-radius: 6px;
  border: 1px solid #333;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 8px;
}

.question {
  margin-bottom: 15px;
}

.correct { background: #b6f5c6; }
.wrong { background: #f5b6b6; }

#result {
  margin-top: 15px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<h1>📊 Grammar Tests</h1>

<div style="text-align:center;">
  <button onclick="selectTopic('be')">📘 To be / have / there is</button>
  <button onclick="selectTopic('present')">📗 Present Simple</button>
  <button onclick="location.href='index.html'">← Back</button>
</div>

<hr>

<div id="levels" style="text-align:center;"></div>

<div id="testArea"></div>

<div style="text-align:center;">
  <button onclick="showResult()">📊 Check result</button>
</div>

<div id="result"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

// ================= Firebase =================
const firebaseConfig = {
  apiKey: "AIzaSyCi7KCyrHNE_D1Eq5WGb8Zrr-loh-xFyj0",
  authDomain: "engtestoge.firebaseapp.com",
  projectId: "engtestoge"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
});

// ================= STATE =================
let topic = "";
let score = 0;
let total = 0;
let answered = new Set();
let currentTestId = "";

// ================= TOPIC =================
function selectTopic(t) {
  topic = t;

  document.getElementById("levels").innerHTML = `
    <button onclick="showTest('${t}_easy')">🟢 Easy</button>
    <button onclick="showTest('${t}_normal')">🟡 Normal</button>
    <button onclick="showTest('${t}_hard')">🔴 Exam</button>
      <button onclick="showTest('${t}_upper')">🟣 Upper-Intermediate</button>
  `;
}

// ================= TESTS =================
function showTest(type) {
  score = 0;
  answered = new Set();
  currentTestId = type;

  let html = "";

  // ================= TO BE =================
  if (type === "be_easy") {
    total = 10;

    html = `
    <div class="card"><h3>To be - Easy</h3>
    ${q("q1","I ___ a student.","am","is")}
    ${q("q2","He ___ happy.","is","are")}
    ${q("q3","They ___ at home.","are","is")}
    ${q("q4","She ___ my friend.","is","are")}
    ${q("q5","We ___ students.","are","is")}
    ${q("q6","I ___ 15 years old.","am","is")}
    ${q("q7","It ___ cold.","is","are")}
    ${q("q8","They ___ my parents.","are","is")}
    ${q("q9","She ___ a doctor.","is","are")}
    ${q("q10","We ___ friends.","are","is")}
    </div>`;
  }

  if (type === "be_normal") {
    total = 10;

    html = `
    <div class="card"><h3>To be / have / there is - Normal</h3>
    ${q("q1","She ___ a book.","has","have")}
    ${q("q2","I ___ a car.","have","has")}
    ${q("q3","There ___ a cat.","is","are")}
    ${q("q4","There ___ two apples.","are","is")}
    ${q("q5","He ___ a brother.","has","have")}
    ${q("q6","We ___ a house.","have","has")}
    ${q("q7","There ___ many students.","are","is")}
    ${q("q8","She ___ a dog.","has","have")}
    ${q("q9","I ___ a pen.","have","has")}
    ${q("q10","There ___ a problem.","is","are")}
    </div>`;
  }

  if (type === "be_hard") {
    total = 10;

    html = `
    <div class="card"><h3>To be / have / there is - Exam</h3>
    ${q("q1","My sister ___ friends.","has","have")}
    ${q("q2","There ___ not enough time.","is","are")}
    ${q("q3","I ___ never late.","am","is")}
    ${q("q4","There ___ three books.","are","is")}
    ${q("q5","He ___ very busy.","is","are")}
    ${q("q6","We ___ homework.","have","has")}
    ${q("q7","There ___ people in park.","are","is")}
    ${q("q8","She ___ a phone.","has","have")}
    ${q("q9","I ___ no idea.","have","has")}
    ${q("q10","There ___ nothing in box.","is","are")}
    </div>`;
  }

  if (type === "be_upper") {
  total = 10;

  html = `
  <div class="card"><h3>Upper-Intermediate - Mixed Structures</h3>

  ${q("q1","There ___ been a mistake in the system.","has","have")}
  ${q("q2","She ___ got a lot of experience in finance.","has","have")}
  ${q("q3","There ___ no evidence available.","is","are")}
  ${q("q4","He ___ been working here since 2020.","has","have")}
  ${q("q5","There ___ several reasons for this decision.","are","is")}
  ${q("q6","I ___ never seen such a situation before.","have","has")}
  ${q("q7","There ___ been changes in the schedule.","have","has")}
  ${q("q8","She ___ already finished the report.","has","have")}
  ${q("q9","There ___ a strong connection between them.","is","are")}
  ${q("q10","We ___ got enough data to proceed.","have","has")}

  </div>`;
}
  // ================= PRESENT SIMPLE =================
  if (type === "present_easy") {
    total = 10;

    html = `
    <div class="card"><h3>Present Simple - Affirmative</h3>
    ${q("q1","He ___ football.","plays","play")}
    ${q("q2","She ___ books.","reads","read")}
    ${q("q3","I ___ to school.","go","goes")}
    ${q("q4","They ___ TV.","watch","watches")}
    ${q("q5","We ___ English.","study","studies")}
    ${q("q6","He ___ lunch.","eats","eat")}
    ${q("q7","She ___ music.","likes","like")}
    ${q("q8","I ___ home.","go","goes")}
    ${q("q9","They ___ games.","play","plays")}
    ${q("q10","It ___ fast.","runs","run")}
    </div>`;
  }

  if (type === "present_normal") {
    total = 10;

    html = `
    <div class="card"><h3>Present Simple - Negative</h3>
    ${q("q1","He ___ not like coffee.","doesn't","don't")}
    ${q("q2","She ___ not go to school.","doesn't","don't")}
    ${q("q3","They ___ not play football.","don't","doesn't")}
    ${q("q4","I ___ not watch TV.","don't","doesn't")}
    ${q("q5","We ___ not live here.","don't","doesn't")}
    ${q("q6","He ___ not eat meat.","doesn't","don't")}
    ${q("q7","She ___ not work today.","doesn't","don't")}
    ${q("q8","They ___ not study English.","don't","doesn't")}
    ${q("q9","I ___ not know.","don't","doesn't")}
    ${q("q10","It ___ not rain often.","doesn't","don't")}
    </div>`;
  }

  if (type === "present_hard") {
    total = 10;

    html = `
    <div class="card"><h3>Present Simple - Questions</h3>
    ${q("q1","___ he like tea?","Does","Do")}
    ${q("q2","___ they go to school?","Do","Does")}
    ${q("q3","___ she work here?","Does","Do")}
    ${q("q4","___ you play football?","Do","Does")}
    ${q("q5","___ it rain often?","Does","Do")}
    ${q("q6","___ we need help?","Do","Does")}
    ${q("q7","___ he live here?","Does","Do")}
    ${q("q8","___ they study English?","Do","Does")}
    ${q("q9","___ she know him?","Does","Do")}
    ${q("q10","___ I need this book?","Do","Does")}
    </div>`;
  }

  if (type === "present_upper") {
  total = 10;

  html = `
  <div class="card"><h3>Upper-Intermediate - Present Simple</h3>

  ${q("q1","He rarely ___ coffee in the morning.","drinks","drink")}
  ${q("q2","She ___ not usually agree with this idea.","does","do")}
  ${q("q3","They ___ often discuss financial issues.","discuss","discusses")}
  ${q("q4","The company ___ new policies every year.","introduces","introduce")}
  ${q("q5","He ___ not understand the problem clearly.","does","do")}
  ${q("q6","We ___ always check the results carefully.","do","does")}
  ${q("q7","She ___ usually works late.","works","work")}
  ${q("q8","The system ___ not allow manual changes.","does","do")}
  ${q("q9","They ___ rarely make mistakes.","make","makes")}
  ${q("q10","He ___ always knows the answer.","knows","know")}

  </div>`;
}
  document.getElementById("testArea").innerHTML = html;
  document.getElementById("result").innerText = "";
}

// ================= QUESTION =================
function q(id, text, correct, wrong) {
  return `
  <div class="question">
    ${text}<br>
    <button onclick="check(this,'${id}',true)">${correct}</button>
    <button onclick="check(this,'${id}',false)">${wrong}</button>
  </div>`;
}

// ================= CHECK =================
function check(btn, qid, isCorrect) {
  if (answered.has(qid)) return;

  answered.add(qid);
  btn.disabled = true;

  if (isCorrect) {
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("wrong");
  }
}

// ================= RESULT =================
async function showResult() {
  const res = `Score: ${score} / ${total}`;
  document.getElementById("result").innerText = res;

  if (currentUser) {
    await addDoc(
      collection(db, "results", currentUser.uid, "grammar_tests"),
      {
        testId: currentTestId,
        score,
        maxPoints: total,
        date: serverTimestamp()
      }
    );
  }

  document.getElementById("result").innerHTML = `
    ${res}<br><br>
    <button onclick="location.reload()">🔁 Try again</button>
  `;
}

// expose
window.selectTopic = selectTopic;
window.showTest = showTest;
window.check = check;
window.showResult = showResult;

</script>

</body>
</html>
