<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Grammar Tests</title>

<style>
body {
  font-family: Arial;
  max-width: 850px;
  margin: 20px auto;
  background: #f9f9f9;
  padding: 10px;
}

h1 { text-align: center; }

button {
  padding: 10px 14px;
  margin: 5px;
  cursor: pointer;
  border-radius: 6px;
  border: 1px solid #333;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 8px;
}

.question {
  margin-bottom: 15px;
}

.correct { background: #b6f5c6; }
.wrong { background: #f5b6b6; }

#result {
  margin-top: 15px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<h1>📊 Grammar Tests</h1>

<div style="text-align:center;">
  <button onclick="location.href='index.html'">← Back</button>
</div>

<div style="text-align:center;">
  <button onclick="showTest('be_easy')">🟢 Level 1</button>
  <button onclick="showTest('be_normal')">🟡 Level 2</button>
  <button onclick="showTest('be_hard')">🔴 Level 3</button>
</div>

<div id="testArea"></div>

<div style="text-align:center;">
  <button onclick="showResult()">📊 Check result</button>
</div>

<div id="result"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

// ================= Firebase =================
const firebaseConfig = {
  apiKey: "AIzaSyCi7KCyrHNE_D1Eq5WGb8Zrr-loh-xFyj0",
  authDomain: "engtestoge.firebaseapp.com",
  projectId: "engtestoge"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
});

// ================= State =================
let score = 0;
let total = 0;
let answered = new Set();
let currentTestId = "";

// ================= TESTS =================
function showTest(type) {
  score = 0;
  answered = new Set();
  currentTestId = type;

  let html = "";

  // 🟢 EASY
  if (type === "be_easy") {
    total = 10;

    html = `
    <div class="card">
      <h3>Level 1 (Easy)</h3>

      ${q("q1","I ___ a student.","am","is")}
      ${q("q2","He ___ happy.","is","are")}
      ${q("q3","They ___ at home.","are","is")}
      ${q("q4","She ___ my friend.","is","are")}
      ${q("q5","We ___ students.","are","is")}
      ${q("q6","I ___ 15 years old.","am","is")}
      ${q("q7","It ___ cold.","is","are")}
      ${q("q8","They ___ my parents.","are","is")}
      ${q("q9","She ___ a doctor.","is","are")}
      ${q("q10","We ___ friends.","are","is")}
    </div>`;
  }

  // 🟡 NORMAL
  if (type === "be_normal") {
    total = 10;

    html = `
    <div class="card">
      <h3>Level 2 (Normal)</h3>

      ${q("q1","She ___ a book.","has","have")}
      ${q("q2","I ___ a car.","have","has")}
      ${q("q3","There ___ a cat.","is","are")}
      ${q("q4","There ___ two apples.","are","is")}
      ${q("q5","He ___ a brother.","has","have")}
      ${q("q6","We ___ a house.","have","has")}
      ${q("q7","There ___ many students.","are","is")}
      ${q("q8","She ___ a dog.","has","have")}
      ${q("q9","I ___ a pen.","have","has")}
      ${q("q10","There ___ a problem.","is","are")}
    </div>`;
  }

  // 🔴 HARD
  if (type === "be_hard") {
    total = 10;

    html = `
    <div class="card">
      <h3>Level 3 (Exam)</h3>

      ${q("q1","My sister ___ friends.","has","have")}
      ${q("q2","There ___ not enough time.","is","are")}
      ${q("q3","I ___ never late.","am","is")}
      ${q("q4","There ___ three books.","are","is")}
      ${q("q5","He ___ very busy.","is","are")}
      ${q("q6","We ___ homework.","have","has")}
      ${q("q7","There ___ people in park.","are","is")}
      ${q("q8","She ___ a phone.","has","have")}
      ${q("q9","I ___ no idea.","have","has")}
      ${q("q10","There ___ nothing in box.","is","are")}
    </div>`;
  }

  document.getElementById("testArea").innerHTML = html;
  document.getElementById("result").innerText = "";
}

// ================= QUESTION =================
function q(id, text, correct, wrong) {
  return `
  <div class="question">
    ${text}<br>
    <button onclick="check(this,'${id}',true)">${correct}</button>
    <button onclick="check(this,'${id}',false)">${wrong}</button>
  </div>`;
}

// ================= CHECK =================
function check(btn, qid, isCorrect) {
  if (answered.has(qid)) return;

  answered.add(qid);
  btn.disabled = true;

  if (isCorrect) {
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("wrong");
  }
}

// ================= RESULT =================
async function showResult() {
  const res = `Score: ${score} / ${total}`;
  document.getElementById("result").innerText = res;

  if (currentUser) {
    await addDoc(
      collection(db, "results", currentUser.uid, "grammar_tests"),
      {
        testId: currentTestId,
        score,
        maxPoints: total,
        date: serverTimestamp()
      }
    );
  }

  document.getElementById("result").innerHTML = `
    ${res}<br><br>

    <button onclick="location.href='grammar.html'">
      📘 Back to theory
    </button>

    <button onclick="location.reload()">
      🔁 Try again
    </button>
  `;
}

// expose
window.showTest = showTest;
window.check = check;
window.showResult = showResult;

</script>

</body>
</html>
